string = "#b5bd68"         # Green
comment = "#969896"        # Gray
number = "#de935f"         # Orange
operator = "#8abeb7"       # Cyan
identifier = "#c5c8c6"     # White
type_ = "#f0c674"          # Yellow
function = "#81a2be"       # Blue
variable = "#c5c8c6"       # White
property = "#8abeb7"       # Cyan
parameter = "#cc6666"      # Red
constant = "#de935f"       # Orange
namespace = "#b294bb"      # Purple
punctuation = "#c5c8c6"    # White
tag = "#cc6666"            # Red
attribute = "#f0c674"      # Yellow
normal = "#c5c8c6"         # White

# UI colors
