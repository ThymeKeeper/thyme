string = "#a6e3a1"         # Green
comment = "#6c7086"        # Overlay1
number = "#fab387"         # Peach
operator = "#89dceb"       # Sky
identifier = "#cdd6f4"     # Text
type_ = "#f38ba8"          # Pink
function = "#89b4fa"       # Blue
variable = "#cdd6f4"       # Text
property = "#94e2d5"       # Teal
parameter = "#f9e2af"      # Yellow
constant = "#fab387"       # Peach
namespace = "#cba6f7"      # Mauve
punctuation = "#cdd6f4"    # Text
tag = "#f38ba8"            # Pink
attribute = "#a6e3a1"      # Green
normal = "#cdd6f4"         # Text

# UI colors
