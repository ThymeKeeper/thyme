name = "Gruvbox Dark"

[colors]
# Editor colors
background = "#282828"
foreground = "#ebdbb2"
cursor = "#fe8019"
selection = "#3c3836"
line_number = "#7c6f64"
current_line = "#3c3836"

# Syntax colors
keyword = "#fb4934"        # Red
string = "#b8bb26"         # Green
comment = "#928374"        # Gray
number = "#d3869b"         # Purple
operator = "#fe8019"       # Orange
identifier = "#ebdbb2"     # Foreground
type_ = "#83a598"          # Blue
function = "#fabd2f"       # Yellow
variable = "#ebdbb2"       # Foreground
property = "#8ec07c"       # Aqua
parameter = "#fe8019"      # Orange
constant = "#d3869b"       # Purple
namespace = "#fb4934"      # Red
punctuation = "#a89984"    # Light Gray
tag = "#fb4934"            # Red
attribute = "#b8bb26"      # Green
normal = "#ebdbb2"         # Foreground

# UI colors
status_bar_bg = "#504945"
status_bar_fg = "#ebdbb2"
border = "#7c6f64"
border_active = "#fe8019"
modal_bg = "#3c3836"
modal_fg = "#ebdbb2"
selection_bg = "#fe8019"
selection_fg = "#282828"

[styles]
# Text styles (bold, italic, underline, etc.)
# Default: no text styles (all regular text)
keyword = []
string = []
comment = []
number = []
operator = []
identifier = []
type_ = []
function = []
variable = []
property = []
parameter = []
constant = []
namespace = []
punctuation = []
tag = []
attribute = []
normal = []
