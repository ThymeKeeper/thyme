name = "Base16 Ocean"

[colors]
# Editor colors
background = "#2b303b"
foreground = "#c0c5ce"
cursor = "#8fa1b3"
selection = "#4f5b66"
line_number = "#65737e"
current_line = "#343d46"

# Syntax colors
keyword = "#b48ead"        # Purple
string = "#a3be8c"         # Green
comment = "#65737e"        # Gray
number = "#d08770"         # Orange
operator = "#96b5b4"       # Cyan
identifier = "#c0c5ce"     # Light Gray
type_ = "#ebcb8b"          # Yellow
function = "#8fa1b3"       # Blue
variable = "#c0c5ce"       # Light Gray
property = "#96b5b4"       # Cyan
parameter = "#bf616a"      # Red
constant = "#d08770"       # Orange
namespace = "#b48ead"      # Purple
punctuation = "#c0c5ce"    # Light Gray
tag = "#bf616a"            # Red
attribute = "#a3be8c"      # Green
normal = "#c0c5ce"         # Light Gray
virtual_line = "#65737e"   # Comment (used for virtual lines)

# UI colors
status_bar_bg = "#343d46"
status_bar_fg = "#c0c5ce"
border = "#65737e"
border_active = "#8fa1b3"
modal_bg = "#343d46"
modal_fg = "#c0c5ce"
selection_bg = "#8fa1b3"
selection_fg = "#2b303b"

[styles]
# Text styles (bold, italic, underline, etc.)
# Default: no text styles (all regular text)
keyword = []
string = []
comment = []
number = []
operator = []
identifier = []
type_ = []
function = []
variable = []
property = []
parameter = []
constant = []
namespace = []
punctuation = []
tag = []
attribute = []
normal = []
