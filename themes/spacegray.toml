name = "Spacegray"

[colors]
# Editor colors
background = "#2c2d30"
foreground = "#b7b8b9"
cursor = "#79c0ff"
selection = "#4e5a65"
line_number = "#65737e"
current_line = "#343741"

# Syntax colors
keyword = "#9a93e1"        # Purple
string = "#96ceb4"         # Mint Green
comment = "#65737e"        # Gray
number = "#d4976c"         # Orange
operator = "#79c0ff"       # Light Blue
identifier = "#b7b8b9"     # Light Gray
type_ = "#f4d03f"          # Yellow
function = "#79c0ff"       # Light Blue
variable = "#b7b8b9"       # Light Gray
property = "#7fdbca"       # Teal
parameter = "#dfe6e9"      # Very Light Gray
constant = "#d4976c"       # Orange
namespace = "#9a93e1"      # Purple
punctuation = "#b7b8b9"    # Light Gray
tag = "#e74c3c"            # Red
attribute = "#96ceb4"      # Mint Green
normal = "#b7b8b9"         # Light Gray
virtual_line = "#3f454b"   # More visible color for virtual lines

# UI colors
status_bar_bg = "#343741"
status_bar_fg = "#b7b8b9"
border = "#65737e"
border_active = "#79c0ff"
modal_bg = "#343741"
modal_fg = "#b7b8b9"
selection_bg = "#5294e2"
selection_fg = "#eff1f5"
virtual_line = "#383c4a"
find_match_bg = "#f99157"
find_match_fg = "#2b303b"
find_current_match_bg = "#aec795"
find_current_match_fg = "#2b303b"

[styles]
# Text styles (bold, italic, underline, etc.)
# Default: no text styles (all regular text)
keyword = []
string = []
comment = []
number = []
operator = []
identifier = []
type_ = []
function = []
variable = []
property = []
parameter = []
constant = []
namespace = []
punctuation = []
tag = []
attribute = []
normal = []
