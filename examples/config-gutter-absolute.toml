[margins]
vertical = 1
horizontal = 2

# Gutter configuration with absolute line numbers
# Options: "None", "Absolute", "Relative"
gutter = "Absolute"

word_wrap = false
auto_save_delay_seconds = 0
scrolloff = 3

[keybindings]
help = { code = "F1", modifiers = [] }
increase_vertical_margin = { code = "F2", modifiers = [] }
decrease_vertical_margin = { code = "F3", modifiers = [] }
increase_horizontal_margin = { code = "F4", modifiers = [] }
decrease_horizontal_margin = { code = "F5", modifiers = [] }
toggle_word_wrap = { code = "F6", modifiers = [] }
toggle_gutter = { code = "F7", modifiers = [] }
language_selection = { code = "l", modifiers = ["ctrl"] }
theme_selection = { code = "t", modifiers = ["ctrl"] }
